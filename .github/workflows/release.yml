# Dobbscoin release CI.
#
# Triggers on tag push (v*) — builds the four canonical release artifacts and
# publishes them to a GitHub release. Also runnable manually via workflow_dispatch
# for dry runs (no release is created in that case).
#
# Pinned to ubuntu-22.04: 24.04's mingw-w64-13 redefines TOUCHINPUT in winuser.h,
# which breaks Qt 5.7's direct2d plugin. Lesson learned from OFF PR#1.
#
# Build times (first run, cold caches):
#   build-linux   ~10 min  (BDB 4.8 build dominates)
#   build-win64   ~30 min  (depends/ tree build dominates)
#   build-appimage ~3 min  (downloads linuxdeploy, packages output of build-linux)
#   release       <1 min   (uploads + gh release create)
# Subsequent runs with warm caches: ~15 min end-to-end.

name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build artifacts only; do not create a GitHub release"
        type: boolean
        default: true

env:
  # SHA256 of db-4.8.30.NC.tar.gz — verified Oracle download.
  BDB_TARBALL_SHA256: "12edc0df75bf9abd7f82f821795bcee50f42cb2e5f76a6a281b85732798364ef"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          # On tag push: use the tag (drop leading 'v'). On manual dispatch:
          # synthesize from configure.ac + short SHA.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            v=$(grep -E '_CLIENT_VERSION_(MAJOR|MINOR|REVISION)' configure.ac \
                | grep -oE '[0-9]+' | paste -sd. -)
            echo "version=${v}-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            libssl-dev libevent-dev bsdmainutils python3 \
            libboost-system-dev libboost-filesystem-dev libboost-chrono-dev \
            libboost-program-options-dev libboost-test-dev libboost-thread-dev \
            qtbase5-dev qttools5-dev qttools5-dev-tools libqt5gui5 libqt5core5a \
            libqt5dbus5 libqrencode-dev libprotobuf-dev protobuf-compiler \
            ccache file

      - name: Cache BDB 4.8
        id: cache-bdb
        uses: actions/cache@v4
        with:
          path: db4
          # v2: v0.13.2 added an encrypt-wallet smoke step that shells out to
          # db4/bin/db_dump. The v1 cache from earlier runs only preserved
          # lib/ and include/ (utilities weren't being installed). Bumping
          # forces a full rebuild that captures bin/ too.
          key: bdb-4.8.30.NC-ubuntu-22.04-v2

      - name: Build BDB 4.8 (if cache miss)
        if: steps.cache-bdb.outputs.cache-hit != 'true'
        run: |
          BDB_PREFIX="$PWD/db4"
          mkdir -p "$BDB_PREFIX"
          curl -fsSL -o db-4.8.30.NC.tar.gz \
            'https://download.oracle.com/berkeley-db/db-4.8.30.NC.tar.gz'
          echo "${BDB_TARBALL_SHA256}  db-4.8.30.NC.tar.gz" | sha256sum -c
          tar -xzf db-4.8.30.NC.tar.gz
          # gcc-11+ has its own __atomic_compare_exchange builtin which collides
          # with BDB 4.8's static inline of the same name. Rename BDB's copy.
          # Standard altcoin-community fix; safe because all in-tree call sites
          # go through the atomic_compare_exchange (no underscore) macro.
          sed -i 's/__atomic_compare_exchange/__atomic_compare_exchange_db/g' \
            db-4.8.30.NC/dbinc/atomic.h
          cd db-4.8.30.NC/build_unix
          ../dist/configure --enable-cxx --disable-shared --with-pic --prefix="$BDB_PREFIX"
          # BDB 4.8 install rules race under -j; build parallel, install serial.
          make -j"$(nproc)"
          make install

      - name: Configure
        run: |
          ./autogen.sh
          ./configure \
            LDFLAGS="-L$PWD/db4/lib/" CPPFLAGS="-I$PWD/db4/include/" \
            --disable-bench

      - name: Build
        run: make -j"$(nproc)"

      - name: Run consensus test suites
        run: |
          # Gate release on the suites we actually own. The full test_dobbscoin
          # has 62 pre-existing failures in transaction_tests/tx_valid since
          # v0.12.0 (script-flag mismatch with bundled tx_valid.json — chain
          # has shipped this way for years). See memory tx-valid-baseline.
          # wallet_tests + crypto_tests added 2026-06-03 after a CCryptoKeyStore
          # regression shipped in v0.10.3..v0.13.1 went undetected for a quarter.
          ./src/test/test_dobbscoin \
            --run_test=emergency_diff_tests,lwma3_tests,auxpow_tests,checkblock_tests,pow_tests,miner_tests,DoS_tests,wallet_tests,crypto_tests

      - name: Encrypt-wallet round-trip smoke test
        run: |
          # Catches the 8f34d639 class of regression: encryptwallet must persist
          # encrypted keys to BDB AND the resulting wallet.dat must unlock with
          # the same passphrase after a clean restart.
          set -euxo pipefail
          DB_DUMP="$PWD/db4/bin/db_dump"
          if [ ! -x "$DB_DUMP" ]; then
            echo "FAIL: $DB_DUMP missing; the BDB cache is stale (no utilities). Bump the cache key."
            ls -la "$PWD/db4" || true
            ls -la "$PWD/db4/bin" 2>/dev/null || true
            exit 1
          fi
          DD="$RUNNER_TEMP/encrypt-roundtrip"
          mkdir -p "$DD"
          cat > "$DD/dobbscoin.conf" <<EOF
          regtest=1
          server=1
          rpcuser=u
          rpcpassword=p
          rpcport=18555
          listen=0
          discover=0
          upnp=0
          EOF
          ./src/dobbscoind -datadir="$DD" -daemon
          sleep 4
          ./src/dobbscoin-cli -datadir="$DD" -rpcport=18555 getinfo > /dev/null
          ./src/dobbscoin-cli -datadir="$DD" -rpcport=18555 encryptwallet "ci-smoke-pass" \
            | grep -q "wallet encrypted" || { echo "FAIL: encryptwallet did not return success message"; exit 1; }
          sleep 6
          # On-disk shape: must have ckey records and zero leaked cleartext key records
          # grep can return 1 on zero matches under set -e; pipe through wc to
          # normalize to a count. Pipefail won't fire because grep returns 0 OR 1
          # (both "expected" outcomes here) and wc always returns 0.
          CKEY=$("$DB_DUMP" -p "$DD/regtest/wallet.dat" | { grep -E '^ \\0[0-9a-f]ckey' || true; } | wc -l)
          KEY=$("$DB_DUMP" -p "$DD/regtest/wallet.dat" | { grep -E '^ \\0[0-9a-f]key$' || true; } | wc -l)
          MKEY=$("$DB_DUMP" -p "$DD/regtest/wallet.dat" | { grep -E '^ \\0[0-9a-f]mkey' || true; } | wc -l)
          echo "post-encrypt wallet.dat: ckey=$CKEY key=$KEY mkey=$MKEY"
          test "$CKEY" -gt 0 || { echo "FAIL: no ckey records"; exit 1; }
          test "$KEY" -eq 0 || { echo "FAIL: $KEY leaked cleartext key records"; exit 1; }
          test "$MKEY" -gt 0 || { echo "FAIL: no mkey record"; exit 1; }
          # Restart and verify unlock works
          ./src/dobbscoind -datadir="$DD" -daemon
          sleep 4
          ./src/dobbscoin-cli -datadir="$DD" -rpcport=18555 walletpassphrase "ci-smoke-pass" 30 \
            || { echo "FAIL: walletpassphrase rejected the correct passphrase"; exit 1; }
          UNLOCKED=$(./src/dobbscoin-cli -datadir="$DD" -rpcport=18555 getinfo \
            | awk -F'[ ,]+' '/unlocked_until/{print $4}')
          test "${UNLOCKED:-0}" -gt 0 || { echo "FAIL: unlocked_until not set"; exit 1; }
          ./src/dobbscoin-cli -datadir="$DD" -rpcport=18555 stop
          echo "encrypt-roundtrip OK"

      - name: Package — daemon-only tarball
        run: |
          v="${{ steps.version.outputs.version }}"
          stage="dobbscoin-v${v}-linux-daemon"
          mkdir -p "$stage"
          cp src/dobbscoind "$stage/"
          strip "$stage/dobbscoind"
          cp COPYING README.md "$stage/" 2>/dev/null || true
          tar -czf "${stage}.tar.gz" "$stage"

      - name: Package — Qt5 dynamic tarball
        run: |
          v="${{ steps.version.outputs.version }}"
          stage="dobbscoin-v${v}-linux-qt"
          mkdir -p "$stage"
          cp src/qt/dobbscoin-qt src/dobbscoind "$stage/"
          strip "$stage/dobbscoin-qt" "$stage/dobbscoind"
          cp COPYING README.md "$stage/" 2>/dev/null || true
          tar -czf "${stage}.tar.gz" "$stage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarballs
          path: |
            dobbscoin-v*-linux-daemon.tar.gz
            dobbscoin-v*-linux-qt.tar.gz
            src/qt/dobbscoin-qt
          if-no-files-found: error
          retention-days: 7

  build-win64:
    runs-on: ubuntu-22.04
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compile deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libtool autotools-dev automake pkg-config \
            bsdmainutils curl ca-certificates \
            g++-mingw-w64-x86-64 mingw-w64-x86-64-dev \
            python3 ccache
          # Use posix-threads variant of mingw, as OFF PR#1 vindicated for
          # static qrencode + winpthread cleanliness.
          sudo update-alternatives --set x86_64-w64-mingw32-g++ \
            /usr/bin/x86_64-w64-mingw32-g++-posix
          sudo update-alternatives --set x86_64-w64-mingw32-gcc \
            /usr/bin/x86_64-w64-mingw32-gcc-posix

      - name: Cache depends/ tree
        id: cache-depends
        uses: actions/cache@v4
        with:
          path: |
            depends/x86_64-w64-mingw32
            depends/built
            depends/sources
          # Rebuild only when the depends recipes themselves change.
          key: depends-x86_64-w64-mingw32-ubuntu-22.04-${{ hashFiles('depends/packages/*.mk', 'depends/Makefile', 'depends/funcs.mk') }}

      - name: Build depends/ (if cache miss)
        if: steps.cache-depends.outputs.cache-hit != 'true'
        env:
          # depends/Makefile's default FALLBACK_DOWNLOAD_PATH points at
          # dobbscoincore.org, a domain that was never stood up. When upstream
          # mirrors (snapshot.debian.org, etc.) 404 on legacy tarballs the
          # whole build collapses. Bitcoin Core hosts the canonical pre-0.12
          # depends tarball set including qrencode-3.4.3, openssl-1.0.1k, etc.
          FALLBACK_DOWNLOAD_PATH: https://bitcoincore.org/depends-sources
        run: |
          make -C depends -j"$(nproc)" HOST=x86_64-w64-mingw32 NO_QT_TRANSLATIONS=1

      - name: Configure cross
        run: |
          ./autogen.sh
          # -Wa,-mbig-obj per OFF PR#1: gcc-10+ template expansion in main.cpp
          # can blow past PE-COFF's 16-bit section count (33,772 sections in
          # OFF's case). Cheap insurance; ours doesn't trip today but will if
          # depends/ Qt is bumped or new template-heavy code lands.
          ./configure \
            CONFIG_SITE="$PWD/depends/x86_64-w64-mingw32/share/config.site" \
            --prefix="$PWD/depends/x86_64-w64-mingw32" \
            --disable-tests --disable-bench \
            CXXFLAGS="-O2 -Wa,-mbig-obj"

      - name: Regenerate protobuf with depends protoc
        run: |
          cd src/qt
          ../../depends/x86_64-w64-mingw32/native/bin/protoc \
            --cpp_out=. paymentrequest.proto

      - name: Build
        run: make -j"$(nproc)"

      - name: Verify static link (no orphan DLL deps)
        run: |
          # OFF PR#1 baseline: 100% Win32 system DLLs, no Qt5*.dll, no
          # libwinpthread, no libgcc_s_seh. Fail loudly if our build regresses.
          for exe in src/dobbscoind.exe src/qt/dobbscoin-qt.exe; do
            echo "--- $exe ---"
            deps=$(x86_64-w64-mingw32-objdump -p "$exe" \
              | awk '/^\tDLL Name:/ {print $3}' | sort -u)
            echo "$deps"
            if echo "$deps" | grep -iE '^(Qt5|libwinpthread|libgcc_s|libstdc\+\+|libssp|libpng|libssl|libcrypto)' >/dev/null; then
              echo "FAIL: orphan runtime DLL dependency detected" >&2
              exit 1
            fi
          done

      - name: Package — Win64 zip
        run: |
          v="${{ needs.build-linux.outputs.version }}"
          stage="dobbscoin-v${v}-win64"
          mkdir -p "$stage"
          cp src/dobbscoind.exe src/qt/dobbscoin-qt.exe "$stage/"
          x86_64-w64-mingw32-strip "$stage/"*.exe
          cp COPYING README.md "$stage/" 2>/dev/null || true
          zip -r "${stage}.zip" "$stage"

      - name: Upload Win64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win64-zip
          path: dobbscoin-v*-win64.zip
          if-no-files-found: error
          retention-days: 7

  build-appimage:
    runs-on: ubuntu-22.04
    needs: build-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install AppImage runtime deps
        run: |
          sudo apt-get update
          # Boost runtime libs are required so linuxdeploy can resolve
          # dobbscoin-qt's dynamic deps. Match the set build-linux linked
          # against: filesystem, system, thread, chrono, program_options.
          sudo apt-get install -y \
            libqt5gui5 libqt5core5a libqt5dbus5 libqt5network5 libqt5widgets5 \
            libqt5printsupport5 \
            qt5-qmake qtchooser qttools5-dev-tools \
            libboost-filesystem1.74.0 libboost-system1.74.0 \
            libboost-thread1.74.0 libboost-chrono1.74.0 \
            libboost-program-options1.74.0 \
            libqrencode4 libprotobuf23 libssl3 libevent-2.1-7 \
            fuse libfuse2 file desktop-file-utils

      - name: Download linuxdeploy + qt plugin
        run: |
          mkdir -p tools && cd tools
          curl -fsSL -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSL -o linuxdeploy-plugin-qt \
            https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy linuxdeploy-plugin-qt

      - name: Download dobbscoin-qt from build-linux
        uses: actions/download-artifact@v4
        with:
          name: linux-tarballs
          path: linux-stage

      - name: Stage AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications \
                   AppDir/usr/share/icons/hicolor/256x256/apps
          # upload-artifact@v4 preserves the relative path of each uploaded
          # file, so the binary lands at linux-stage/src/qt/dobbscoin-qt, not
          # the flattened linux-stage/dobbscoin-qt.
          install -m 0755 linux-stage/src/qt/dobbscoin-qt AppDir/usr/bin/dobbscoin-qt
          cp contrib/debian/dobbscoin-qt.desktop \
             AppDir/usr/share/applications/dobbscoin.desktop
          cp share/pixmaps/dobbscoin256.png \
             AppDir/usr/share/icons/hicolor/256x256/apps/dobbscoin128.png

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./tools/linuxdeploy \
            --appdir AppDir \
            --plugin qt \
            --executable AppDir/usr/bin/dobbscoin-qt \
            --desktop-file AppDir/usr/share/applications/dobbscoin.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/dobbscoin128.png \
            --output appimage

      - name: Rename AppImage with version
        run: |
          v="${{ needs.build-linux.outputs.version }}"
          mv Dobbscoin-x86_64.AppImage "dobbscoin-v${v}-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: dobbscoin-v*-x86_64.AppImage
          if-no-files-found: error
          retention-days: 7

  release:
    runs-on: ubuntu-22.04
    needs: [build-linux, build-win64, build-appimage]
    # Only publish a real release on tag push; manual runs stop after artifacts.
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || !inputs.dry_run)
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect release assets
        run: |
          mkdir -p release
          # Only the .tar.gz / .zip / .AppImage are release assets; the
          # unwrapped dobbscoin-qt binary in linux-tarballs/ is for AppImage
          # staging only and stays out.
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.AppImage' \) \
            -exec cp {} release/ \;
          cd release
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt
          ls -lh

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          v="${{ needs.build-linux.outputs.version }}"
          gh release create "v${v}" \
            --title "Dobbscoin Core v${v}" \
            --notes "Automated release build. See release-notes/ in the source tree for changelog." \
            --draft \
            release/*
